[[repos]]
repo = "builtin"
hooks = [
  { id = "check-added-large-files", stages = ["pre-commit"] },
  { id = "check-case-conflict", stages = ["pre-commit"] },
  { id = "check-executables-have-shebangs", stages = ["pre-commit"] },
  { id = "check-yaml", stages = ["pre-commit"] },
  { id = "check-json", stages = ["pre-commit"] },
  { id = "check-merge-conflict", stages = ["pre-commit"] },
  { id = "end-of-file-fixer", stages = ["pre-commit"] },
  { id = "mixed-line-ending", stages = ["pre-commit"] },
  { id = "trailing-whitespace", stages = ["pre-commit"] },
]

[[repos]]
repo = "https://github.com/tombi-toml/tombi-pre-commit"
rev = "v0.9.20"
hooks = [
  {
    id = "tombi-format",
    exclude = "^Cargo\\.lock$",
    stages = ["pre-commit"]
  },
  {
    id = "tombi-lint",
    args = ["--error-on-warnings"],
    stages = ["pre-commit"]
  },
]

[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.12"
hooks = [{ id = "actionlint", stages = ["pre-commit"] }]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.33.1"
hooks = [{ id = "typos", args = ["--force-exclude"], stages = ["pre-commit"] }]

[[repos]]
repo = "https://github.com/zrr1999/zendev"
rev = "v0.0.7"
hooks = [{ id = "zendev-commit-msg", stages = ["commit-msg"] }]

[[repos]]
repo = "local"
hooks = [
  {
    id = "pi-boundary-check",
    name = "package boundary check (dependency-cruiser)",
    entry = "pnpm run check:boundaries",
    language = "system",
    pass_filenames = false,
    stages = ["pre-commit"]
  },
  {
    id = "spark-doc-terminology-check",
    name = "Spark documentation terminology check",
    entry = "node scripts/check-doc-terminology.mjs",
    language = "system",
    pass_filenames = true,
    stages = ["pre-commit"]
  },
  {
    id = "vp-check",
    name = "vp check --fix",
    entry = "bash -c 'pnpm --filter @zendev-lab/spark-cockpit exec svelte-kit sync && pnpm exec vp check --fix'",
    language = "system",
    pass_filenames = false,
    stages = ["pre-commit"]
  },
]
