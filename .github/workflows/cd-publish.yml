name: "CD - Publish"

on:
  push:
    tags:
      - "v*"

concurrency:
  group: cd-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run repository checks
        run: pnpm run check

      - name: Run Cockpit browser tests
        run: pnpm run test:browser:cockpit

      - name: Build the release artifact once
        env:
          SPARK_BUILD_GIT_SHA: ${{ github.sha }}
        run: pnpm run release:pack

      - name: Verify release metadata
        run: node scripts/verify-release-state.mjs --artifact-only

      - name: Smoke the exact release artifact
        run: node scripts/smoke-npm-product.mjs --tarball dist/release/spark-${{ github.ref_name }}.tgz

      - name: Verify N-1 expand-only migration compatibility
        run: node scripts/test-release-migration.mjs --tarball dist/release/spark-${{ github.ref_name }}.tgz

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spark-release-${{ github.ref_name }}
          path: dist/release/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - name: Download release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: spark-release-${{ github.ref_name }}
          path: dist/release

      - name: Verify artifact and published state
        id: release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/verify-release-state.mjs

      - name: Stage draft GitHub Release
        if: steps.release.outputs.github_published != 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          name: Spark ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/release/spark-${{ github.ref_name }}.tgz
            dist/release/release-manifest.json
            dist/release/SHA256SUMS

      - name: Publish the exact artifact to npm
        if: steps.release.outputs.npm_published != 'true'
        uses: JS-DevTools/npm-publish@0fd2f4369c5d6bcfcde6091a7c527d810b9b5c3f # v4.1.5
        with:
          package: dist/release/spark-${{ github.ref_name }}.tgz
          access: public
          tag: ${{ contains(github.ref_name, '-') && 'next' || 'latest' }}
          provenance: true
          token: ${{ secrets.NPM_TOKEN }}

      - name: Attest release artifact
        if: steps.release.outputs.github_published != 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/release/spark-${{ github.ref_name }}.tgz

      - name: Publish GitHub Release after npm succeeds
        if: steps.release.outputs.github_published != 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
