name: "CI - Static Checks"

# PR static lane: prek hooks except vp-check. Full `vp check` already runs inside
# `pnpm run check` on ci-verify.yml; skipping here avoids duplicate typecheck/format
# work on every PR while keeping local pre-commit vp-check intact.
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-static-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prek:
    name: prek
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: j178/prek-action@v2
        with:
          install-only: true

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - uses: j178/prek-action@v2
        with:
          # Keep --all-files (action default) but skip vp-check; see workflow header.
          extra-args: "--all-files --skip vp-check"
