name: "CI - Static Checks"

# PR hook lane: prek hooks except spark-check-fix. The explicit static verification
# runs in parallel with unit/process/browser lanes in ci-verify.yml.
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-static-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prek:
    name: prek
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Use the repo-pinned prek binary. The action cache is PR-ref scoped and
      # restoring it twice cost substantially more than the hooks themselves.
      - run: pnpm exec prek run --all-files --skip spark-check-fix
