name: "CI - Typos"

on:
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "_typos.toml"
      - "AGENTS.md"
      - "README.md"
      - "apps/**"
      - "docs/**"
      - "packages/**"
      - "test/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/**"
      - "_typos.toml"
      - "AGENTS.md"
      - "README.md"
      - "apps/**"
      - "docs/**"
      - "packages/**"
      - "test/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typos:
    name: typos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run typos
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
        with:
          config: ./_typos.toml
          files: ".github AGENTS.md README.md apps docs packages test _typos.toml"
