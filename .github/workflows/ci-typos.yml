name: "CI - Typos"

on:
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "_typos.toml"
      - "AGENTS.md"
      - "README.md"
      - "docs/**"
      - "packages/**"
      - "test/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/**"
      - "_typos.toml"
      - "AGENTS.md"
      - "README.md"
      - "docs/**"
      - "packages/**"
      - "test/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typos:
    name: typos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run typos
        uses: crate-ci/typos@b1ae8d918b6e85bd611117d3d9a3be4f903ee5e4 # v1.33.1
        with:
          config: ./_typos.toml
          files: ".github AGENTS.md README.md docs packages test _typos.toml"
