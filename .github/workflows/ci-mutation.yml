name: "CI - Continuous Evaluation (mutation)"

on:
  schedule:
    # Mondays 03:17 UTC
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-ce-mutation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  continuous-evaluation:
    name: ce-mutation-leaf
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run leaf-package mutation CE suite
        run: pnpm run test:mutation

      - name: Upload mutation CE reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-ce-reports
          path: |
            packages/spark-retry/reports/mutation/
            packages/spark-protocol/reports/mutation/
            packages/spark-db/reports/mutation/
            packages/spark-system/reports/mutation/
          if-no-files-found: ignore
          retention-days: 14
