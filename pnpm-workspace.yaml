packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  "@google/genai": true
  esbuild: true
  koffi: true
  protobufjs: true

catalog:
  vite: "npm:@voidzero-dev/vite-plus-core@0.1.24"
  vite-plus: "0.1.24"
  vitest: "npm:@voidzero-dev/vite-plus-test@0.1.24"

overrides:
  vite: "catalog:"
  vite-plus: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowedVersions:
    typescript: "*"
    vite: "*"
    vitest: "*"
