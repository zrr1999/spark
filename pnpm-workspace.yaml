packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  "@google/genai": true
  esbuild: true
  koffi: true
  protobufjs: true

catalog:
  vite: "npm:@voidzero-dev/vite-plus-core@0.2.1"
  vite-plus: "0.2.1"
  vitest: "4.1.9"

minimumReleaseAgeExclude:
  - "@types/node@26.0.1"
  - "@earendil-works/pi-agent-core@0.80.6"
  - "@earendil-works/pi-ai@0.80.6"
  - "@earendil-works/pi-coding-agent@0.80.6"
  - "@earendil-works/pi-tui@0.80.6"

overrides:
  "@connectrpc/connect-node>undici": "6.27.0"
  "@cursor/sdk>zod": "3.25.76"
  "@earendil-works/pi-coding-agent>undici": "8.7.0"
  "@sveltejs/kit>cookie": "0.7.2"
  vite: "catalog:"
  vite-plus: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowedVersions:
    typescript: "*"
    vite: "*"
    vitest: "*"
