packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  "@google/genai": true
  esbuild: true
  koffi: true
  protobufjs: true

catalog:
  vite: "npm:@voidzero-dev/vite-plus-core@0.2.1"
  vite-plus: "0.2.1"
  vitest: "4.1.9"

minimumReleaseAgeExclude:
  - "@types/node@26.0.1"

overrides:
  vite: "catalog:"
  vite-plus: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowedVersions:
    typescript: "*"
    vite: "*"
    vitest: "*"
