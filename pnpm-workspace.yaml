packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  "@google/genai": true
  better-sqlite3: true
  esbuild: true
  koffi: true
  protobufjs: true

catalog:
  "@agentclientprotocol/sdk": "1.2.1"
  "@modelcontextprotocol/sdk": "1.29.0"
  "@orpc/client": "1.14.8"
  "@orpc/contract": "1.14.8"
  "@orpc/server": "1.14.8"
  "@stryker-mutator/core": "9.6.1"
  "@stryker-mutator/vitest-runner": "9.6.1"
  "@types/ws": "^8.18.1"
  es-toolkit: "^1.49.0"
  fast-check: "4.9.0"
  "p-retry": "^8.0.0"
  typebox: "^1.3.6"
  typescript: "^6.0.3"
  vite: "npm:@voidzero-dev/vite-plus-core@0.2.5"
  vite-plus: "0.2.5"
  vitest: "4.1.10"
  ws: "^8.18.3"

minimumReleaseAgeExclude:
  - "@types/node@26.0.1"
  - "@earendil-works/pi-ai@0.80.6"
  - "@earendil-works/pi-tui@0.80.6"

overrides:
  "@connectrpc/connect-node>undici": "6.27.0"
  "@cursor/sdk>zod": "3.25.76"
  # MCP SDK 1.29 still declares Hono Node Server 1.x; keep the secure v2
  # compatibility override scoped to that parent until upstream widens it.
  "@modelcontextprotocol/sdk>@hono/node-server": "2.0.11"
  "@sveltejs/kit>cookie": "0.7.2"
  "ajv>fast-uri": "3.1.4"
  "minimatch>brace-expansion": "5.0.7"
  "rc>ini": "1.3.8"
  "typed-rest-client>qs": "6.15.3"
  vite: "catalog:"
  vite-plus: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowedVersions:
    typescript: "*"
    vite: "*"
    vitest: "*"
